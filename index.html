<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>BallCoach</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- BANNER -->
  <div class="banner">
    <div class="container">
      <h1>BallCoach</h1>
      <h2>L'appli de coaching football pour s’améliorer</h2>
      <a href= "https://www.fff.fr //" class="btn-yellow" target="_blank">Découvrir l'appli</a>
    </div>
  </div>

  <!-- CONTENU PRINCIPAL -->
  <div class="container">

    <h2>Warren Sadji</h2>
    <p class="subtitle">Fondateur & coach certifié Football</p>
    <img class="avatar" src="profile.jpeg" alt="Warren Sadji">

    <h2>Nos services</h2>
    <div class="cards">

      <div class="card">
        <img src="card1.jpg" alt="Formation en ligne">
        <h3>Formation en ligne</h3>
      </div>

      <div class="card">
        <img src="card6.jpg" alt="Coaching perso">
        <h3>Coaching perso</h3>
      </div>

      <div class="card">
        <img src="card3.jpg" alt="Suivi de progression">
        <h3>Suivi de progression</h3>
      </div>

      <div class="card">
        <img src="card4.jpg" alt="Communauté">
        <h3>Communauté</h3>
      </div>

    </div>
  </div>

</body>
</html>
